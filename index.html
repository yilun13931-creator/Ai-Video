<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 影片生成引擎</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="main-wrapper">
        <div class="header">
            <h1>🎬 AI 影片生成引擎</h1>
            <p>專業會員專屬平台</p>
            
            <div id="authSection" class="auth-section">
                <button id="loginBtn" class="btn-google" onclick="handleGoogleLogin()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
                    使用 Google 帳號登入
                </button>
                <div id="userProfile" class="user-profile" style="display: none;">
                    <img id="userPhoto" src="" alt="avatar">
                    <span id="userName">載入中...</span>
                    <button class="btn-logout" onclick="handleLogout()">登出</button>
                </div>
            </div>
        </div>

        <div id="mainApp" style="display: none; opacity: 0.5; pointer-events: none;">
            <div class="panel-container">
                <div class="panel left-panel">
                    <div class="section-title">🔑 步驟 1：您的 API 金鑰 (自動保存)</div>
                    <label>Defapi 金鑰</label>
                    <div class="input-group">
                        <input type="password" id="apiKeyInput" placeholder="儲存後下次將自動填寫...">
                        <button class="btn-save" onclick="saveUserApiKey()">儲存設定</button>
                    </div>
                    <p class="hint">※ 儲存後，金鑰將永久加密保存在您的雲端帳號中(只有你自己看得到)</p>

                    <div class="section-title">🤖 步驟 2：選擇生成模型</div>
                    <select id="modelSelect" onchange="handleModelChange()">
                        <option value="grok" selected>Grok Imagine (速度快 / 適合動態展示)</option>
                        <option value="sora2">Sora 2 Stable (高階運算 / 適合精緻廣告)</option>
                    </select>

                    <div id="imageUploadSection">
                        <div class="section-title">🖼️ 步驟 3：上傳商品參考圖 <span style="color:red;">(商業廣告必填)</span></div>
                        <label>請提供一張清晰的商品圖片作為影片開頭</label>
                        <input type="file" id="imageInput" accept="image/jpeg, image/png, image/webp" onchange="previewImage()">
                        <p class="hint">※ 系統將強制作為影片首幀，確保商品一致性。支援自動 9:16 無損填滿。</p>
                        <div class="preview-container" id="imagePreview"></div>
                    </div>

                    <div class="section-title">✍️ 步驟 4：輸入影片提示詞</div>
                    <label>請描述您希望畫面如何運動（例如：鏡頭緩慢拉近，人物微笑揮手）</label>
                    <textarea id="promptInput" placeholder="請詳細描述動作、運鏡與節奏..."></textarea>

                    <div class="section-title">⏱️ 步驟 5：選擇影片長度</div>
                    <select id="durationInput">
                        <option value="10" selected>10 秒 (預設，適合社群短影音)</option>
                        <option value="15">15 秒 (適合產品細節展示)</option>
                    </select>
                    <p class="hint">※ 系統將自動為您採用 720p 畫質渲染</p>

                    <button id="generateBtn" class="btn-primary" onclick="startVideoGeneration()">🚀 立即以 Grok 生成影片</button>
                    <div id="statusText" class="status-text"></div>
                </div>

                <div class="panel right-panel">
                    <div class="video-container" id="videoContainer" style="display: none;">
                        <video id="resultVideo" controls loop autoplay playsinline></video>
                        <a id="downloadBtn" class="download-btn" href="#" target="_blank">💾 儲存影片</a>
                    </div>
                    <div id="placeholder" class="placeholder">
                        <h2 id="placeholderText">登入後即可開始製作影片</h2>
                    </div>
                </div>
            </div>

            <div class="panel-container" style="margin-top: 10px;">
                <div class="panel" style="width: 100%;">
                    <div class="section-title">🕒 雲端生成紀錄 (所有裝置同步)</div>
                    <p style="font-size: 0.85rem; color: #64748b; margin-top: -5px; margin-bottom: 15px;">※ 紀錄永久安全保存在您的雲端帳號中，最高顯示最新 20 筆。</p>
                    <div id="historyGrid" class="history-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=2026_Final"></script>
</body>
</html>
